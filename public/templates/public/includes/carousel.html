{% load static %}
{% if carousel_images %}

<div class="hero-carousel-section">
    <div class="hero-carousel-container">

        <div id="featuredCarousel"
             class="carousel slide"
             data-bs-ride="carousel"
             data-bs-interval="5000"
             data-bs-pause="hover">

            <!-- Indicators -->
            <div class="carousel-indicators custom-indicators">
                {% for image in carousel_images %}
                <button type="button"
                        data-bs-target="#featuredCarousel"
                        data-bs-slide-to="{{ forloop.counter0 }}"
                        {% if forloop.first %}class="active"{% endif %}
                        aria-current="{% if forloop.first %}true{% endif %}"
                        aria-label="Slide {{ forloop.counter }}">
                </button>
                {% endfor %}
            </div>

            <!-- Slides -->
            <div class="carousel-inner rounded-4 overflow-hidden">
                {% for image in carousel_images %}
                <div class="carousel-item {% if forloop.first %}active{% endif %}">
                    <div class="carousel-image-wrapper">
                        {% if image.link_url %}
                        <a href="{{ image.link_url }}" target="_blank" rel="noopener noreferrer">
                            <img src="{{ image.image.url }}"
                                 class="carousel-image"
                                 alt="Carousel Image {{ forloop.counter }}"
                                 loading="{% if forloop.first %}eager{% else %}lazy{% endif %}">
                        </a>
                        {% else %}
                        <img src="{{ image.image.url }}"
                             class="carousel-image"
                             alt="Carousel Image {{ forloop.counter }}"
                             loading="{% if forloop.first %}eager{% else %}lazy{% endif %}">
                        {% endif %}
                    </div>
                </div>
                {% endfor %}
            </div>

            <!-- Controls -->
            <button class="carousel-control-prev custom-control"
                    type="button"
                    data-bs-target="#featuredCarousel"
                    data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>

            <button class="carousel-control-next custom-control"
                    type="button"
                    data-bs-target="#featuredCarousel"
                    data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>

        </div>

    </div>
</div>

<style>

/* =========================
   SECTION
========================= */

.hero-carousel-section {
    padding: 22px 0;
    background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 45%, #e0f2fe 100%);
}

.hero-carousel-container {
    width: min(88%, 1320px);
    margin: auto;
}

/* =========================
   MAIN CAROUSEL
========================= */

#featuredCarousel {
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    background: #0f172a;
    box-shadow:
        0 8px 24px rgba(0,0,0,0.08),
        0 18px 50px rgba(15,23,42,0.12);
}

/* ── Pure horizontal slide — no fade ── */
#featuredCarousel .carousel-item {
    transition: transform 0.75s cubic-bezier(0.77, 0, 0.18, 1);
}

/* Override Bootstrap's default fade classes just in case */
#featuredCarousel.carousel-fade .carousel-item {
    opacity: 1 !important;
    transform: none;
}
#featuredCarousel.carousel-fade .carousel-item.active {
    opacity: 1 !important;
}

/* =========================
   IMAGE WRAPPER
   Fixed 16:9 landscape ratio
   on every breakpoint
========================= */

.carousel-image-wrapper {
    position: relative;
    width: 100%;
    /* 16:9 landscape — consistent on all screens */
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: #e5e7eb;
}

/* Skeleton shimmer */
.carousel-image-wrapper::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        90deg,
        #e5e7eb 25%,
        #f3f4f6 50%,
        #e5e7eb 75%
    );
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite linear;
    z-index: 1;
}

.carousel-image-wrapper.loaded::before {
    display: none;
}

@keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* =========================
   IMAGE
========================= */

.carousel-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    position: relative;
    z-index: 2;
}

/* =========================
   CONTROLS
========================= */

.custom-control {
    width: 8%;
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: 10;
}

#featuredCarousel:hover .custom-control {
    opacity: 1;
}

.carousel-control-prev-icon,
.carousel-control-next-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background-color: rgba(15, 23, 42, 0.72);
    background-size: 40%;
    backdrop-filter: blur(10px);
    transition:
        transform 0.2s ease,
        background-color 0.2s ease;
}

.carousel-control-prev-icon:hover,
.carousel-control-next-icon:hover {
    transform: scale(1.08);
    background-color: rgba(30, 41, 59, 0.92);
}

/* =========================
   INDICATORS
========================= */

.custom-indicators {
    bottom: 16px;
    gap: 8px;
    margin-bottom: 0;
}

.custom-indicators button {
    width: 30px;
    height: 4px;
    border: none;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.45);
    transition:
        width 0.25s ease,
        background 0.25s ease;
}

.custom-indicators button.active {
    width: 52px;
    background: #ffffff;
}

/* =========================
   RESPONSIVE
========================= */

@media (min-width: 1600px) {
    .hero-carousel-container {
        max-width: 1250px;
    }
}

@media (max-width: 1200px) {
    .hero-carousel-container {
        width: 92%;
    }
}

@media (max-width: 992px) {
    .hero-carousel-section {
        padding: 18px 0;
    }
    .hero-carousel-container {
        width: 95%;
    }
    #featuredCarousel {
        border-radius: 20px;
    }
    /* Always visible controls on touch devices */
    .custom-control {
        opacity: 1;
        width: 12%;
    }
    .carousel-control-prev-icon,
    .carousel-control-next-icon {
        width: 42px;
        height: 42px;
    }
}

@media (max-width: 768px) {
    .hero-carousel-section {
        padding: 12px 0;
    }
    .hero-carousel-container {
        width: 100%;
        padding: 0 10px;
    }
    #featuredCarousel {
        border-radius: 14px;
    }
    /* Keep 16:9 on mobile — do NOT override aspect-ratio */
    .carousel-image-wrapper {
        aspect-ratio: 16 / 9;
    }
    .custom-indicators button {
        width: 20px;
    }
    .custom-indicators button.active {
        width: 36px;
    }
    .carousel-control-prev-icon,
    .carousel-control-next-icon {
        width: 34px;
        height: 34px;
    }
}

@media (max-width: 480px) {
    .hero-carousel-container {
        padding: 0 6px;
    }
    #featuredCarousel {
        border-radius: 10px;
    }
    /* Still 16:9 on small phones */
    .carousel-image-wrapper {
        aspect-ratio: 16 / 9;
    }
    .carousel-control-prev-icon,
    .carousel-control-next-icon {
        width: 28px;
        height: 28px;
    }
    .custom-indicators button {
        width: 14px;
        height: 3px;
    }
    .custom-indicators button.active {
        width: 26px;
    }
}

</style>

<script>
document.addEventListener('DOMContentLoaded', function () {

    // ── Skeleton loader removal ──────────────────────────────
    document.querySelectorAll('.carousel-image').forEach(function (img) {
        var wrapper = img.closest('.carousel-image-wrapper');
        var markLoaded = function () {
            if (wrapper) wrapper.classList.add('loaded');
        };
        if (img.complete && img.naturalWidth > 0) {
            markLoaded();
        } else {
            img.addEventListener('load', markLoaded);
            img.addEventListener('error', markLoaded);
        }
    });

    // ── Bootstrap carousel init ──────────────────────────────
    var carouselElement = document.querySelector('#featuredCarousel');

    if (carouselElement && window.bootstrap) {

        // Remove carousel-fade class if it was accidentally set
        carouselElement.classList.remove('carousel-fade');

        var carousel = new bootstrap.Carousel(carouselElement, {
            interval: 5000,
            ride: 'carousel',
            pause: 'hover',
            wrap: true,
            touch: true
        });

        carousel.cycle();

        // Keep autoplay going after manual navigation
        carouselElement.addEventListener('slid.bs.carousel', function () {
            carousel.cycle();
        });
    }
});
</script>

{% endif %}
