{% load static %}
{% if carousel_images %}

<div class="hero-carousel-section">
    <div class="hero-carousel-container">

        <div id="featuredCarousel"
             class="carousel slide carousel-fade"
             data-bs-ride="carousel"
             data-bs-interval="5000"
             data-bs-pause="hover">

            <!-- Indicators -->
            <div class="carousel-indicators custom-indicators">
                {% for image in carousel_images %}
                <button type="button"
                        data-bs-target="#featuredCarousel"
                        data-bs-slide-to="{{ forloop.counter0 }}"
                        {% if forloop.first %}class="active"{% endif %}
                        aria-current="{% if forloop.first %}true{% endif %}"
                        aria-label="Slide {{ forloop.counter }}">
                </button>
                {% endfor %}
            </div>

            <!-- Slides -->
            <div class="carousel-inner rounded-4 overflow-hidden">

                {% for image in carousel_images %}
                <div class="carousel-item {% if forloop.first %}active{% endif %}">

                    <div class="carousel-image-wrapper">

                        {% if image.link_url %}
                        <a href="{{ image.link_url }}" target="_blank" rel="noopener noreferrer">
                            <img src="{{ image.image.url }}"
                                 class="carousel-image"
                                 alt="Carousel Image {{ forloop.counter }}"
                                 loading="{% if forloop.first %}eager{% else %}lazy{% endif %}">
                        </a>
                        {% else %}
                        <img src="{{ image.image.url }}"
                             class="carousel-image"
                             alt="Carousel Image {{ forloop.counter }}"
                             loading="{% if forloop.first %}eager{% else %}lazy{% endif %}">
                        {% endif %}

                    </div>

                </div>
                {% endfor %}

            </div>

            <!-- Controls -->
            <button class="carousel-control-prev custom-control"
                    type="button"
                    data-bs-target="#featuredCarousel"
                    data-bs-slide="prev">

                <span class="carousel-control-prev-icon"></span>
            </button>

            <button class="carousel-control-next custom-control"
                    type="button"
                    data-bs-target="#featuredCarousel"
                    data-bs-slide="next">

                <span class="carousel-control-next-icon"></span>
            </button>

        </div>

    </div>
</div>

<style>

/* =========================
   SECTION
========================= */

.hero-carousel-section {
    padding: 22px 0;
    background:
        linear-gradient(
            135deg,
            #eef2ff 0%,
            #f8fafc 45%,
            #e0f2fe 100%
        );
}

/* Slightly smaller container on large screens */
.hero-carousel-container {
    width: min(88%, 1320px);
    margin: auto;
}

/* =========================
   MAIN CAROUSEL
========================= */

#featuredCarousel {
    border-radius: 24px;
    overflow: hidden;
    position: relative;

    background: #0f172a;

    box-shadow:
        0 8px 24px rgba(0,0,0,0.08),
        0 18px 50px rgba(15,23,42,0.12);
}

/* Smooth sliding transition */
#featuredCarousel .carousel-item {
    transition:
        transform 0.9s ease-in-out,
        opacity 0.9s ease-in-out;
}

/* =========================
   IMAGE WRAPPER
========================= */

.carousel-image-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: #e5e7eb;
}

/* Skeleton Loader */
.carousel-image-wrapper::before {
    content: "";
    position: absolute;
    inset: 0;

    background:
        linear-gradient(
            90deg,
            #e5e7eb 25%,
            #f3f4f6 50%,
            #e5e7eb 75%
        );

    background-size: 200% 100%;
    animation: shimmer 1.4s infinite linear;

    z-index: 1;
}

.carousel-image-wrapper.loaded::before {
    display: none;
}

@keyframes shimmer {
    0% {
        background-position: 200% 0;
    }
    100% {
        background-position: -200% 0;
    }
}

/* =========================
   IMAGE
========================= */

.carousel-image {
    width: 100%;
    height: 100%;

    object-fit: cover;
    object-position: center;

    display: block;

    /* Removed zoom animation */
    transform: none;
    transition: none;

    position: relative;
    z-index: 2;
}

/* =========================
   CONTROLS
========================= */

.custom-control {
    width: 8%;
    opacity: 0;
    transition: opacity .3s ease;
}

#featuredCarousel:hover .custom-control {
    opacity: 1;
}

.carousel-control-prev-icon,
.carousel-control-next-icon {

    width: 48px;
    height: 48px;

    border-radius: 50%;

    background-color: rgba(15,23,42,0.72);
    background-size: 40%;

    backdrop-filter: blur(10px);

    transition:
        transform .2s ease,
        background-color .2s ease;
}

.carousel-control-prev-icon:hover,
.carousel-control-next-icon:hover {
    transform: scale(1.05);
    background-color: rgba(30,41,59,0.92);
}

/* =========================
   INDICATORS
========================= */

.custom-indicators {
    bottom: 16px;
    gap: 8px;
    margin-bottom: 0;
}

.custom-indicators button {

    width: 30px;
    height: 4px;

    border: none;
    border-radius: 999px;

    background: rgba(255,255,255,0.45);

    transition:
        width .25s ease,
        background .25s ease;
}

.custom-indicators button.active {
    width: 52px;
    background: #ffffff;
}

/* =========================
   RESPONSIVE
========================= */

@media (min-width: 1600px) {
    .hero-carousel-container {
        max-width: 1250px;
    }
}

@media (max-width: 1200px) {
    .hero-carousel-container {
        width: 92%;
    }
}

@media (max-width: 992px) {

    .hero-carousel-section {
        padding: 18px 0;
    }

    .hero-carousel-container {
        width: 95%;
    }

    #featuredCarousel {
        border-radius: 20px;
    }

    .custom-control {
        opacity: 1;
        width: 12%;
    }

    .carousel-control-prev-icon,
    .carousel-control-next-icon {
        width: 42px;
        height: 42px;
    }
}

@media (max-width: 768px) {

    .hero-carousel-container {
        width: 100%;
        padding: 0 12px;
    }

    #featuredCarousel {
        border-radius: 16px;
    }

    .carousel-image-wrapper {
        aspect-ratio: 16 / 10;
    }

    .custom-indicators button {
        width: 20px;
    }

    .custom-indicators button.active {
        width: 36px;
    }

    .carousel-control-prev-icon,
    .carousel-control-next-icon {
        width: 36px;
        height: 36px;
    }
}

@media (max-width: 480px) {

    .carousel-image-wrapper {
        aspect-ratio: 16 / 11;
    }

    .carousel-control-prev-icon,
    .carousel-control-next-icon {
        width: 32px;
        height: 32px;
    }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {

    // ===============================
    // Skeleton Loader Remove
    // ===============================

    document.querySelectorAll('.carousel-image').forEach((img) => {

        const wrapper = img.closest('.carousel-image-wrapper');

        const loaded = () => {
            if (wrapper) {
                wrapper.classList.add('loaded');
            }
        };

        if (img.complete && img.naturalWidth > 0) {
            loaded();
        } else {
            img.addEventListener('load', loaded);
            img.addEventListener('error', loaded);
        }
    });

    // ===============================
    // Bootstrap Carousel Init
    // ===============================

    const carouselElement =
        document.querySelector('#featuredCarousel');

    if (carouselElement && window.bootstrap) {

        const carousel =
            new bootstrap.Carousel(carouselElement, {
                interval: 3500,
                ride: 'carousel',
                pause: 'hover',
                wrap: true,
                touch: true
            });

        // Force autoplay start
        carousel.cycle();

        // Restart autoplay after manual controls
        carouselElement.addEventListener(
            'slid.bs.carousel',
            function () {
                carousel.cycle();
            }
        );
    }
});
</script>

{% endif %}
