{% load static %}
{% if carousel_images %}

<div class="hero-carousel-section">
    <div id="featuredCarousel"
         class="carousel slide"
         data-bs-ride="carousel"
         data-bs-interval="5000"
         data-bs-pause="hover">

        <!-- Indicators -->
        <div class="carousel-indicators custom-indicators">
            {% for image in carousel_images %}
            <button type="button"
                    data-bs-target="#featuredCarousel"
                    data-bs-slide-to="{{ forloop.counter0 }}"
                    {% if forloop.first %}class="active"{% endif %}
                    aria-current="{% if forloop.first %}true{% endif %}"
                    aria-label="Slide {{ forloop.counter }}">
            </button>
            {% endfor %}
        </div>

        <!-- Slides -->
        <div class="carousel-inner">
            {% for image in carousel_images %}
            <div class="carousel-item {% if forloop.first %}active{% endif %}">
                <div class="carousel-image-wrapper">
                    {% if image.link_url %}
                    <a href="{{ image.link_url }}" target="_blank" rel="noopener noreferrer">
                        <img src="{{ image.image.url }}"
                             class="carousel-image"
                             alt="Carousel Image {{ forloop.counter }}"
                             loading="{% if forloop.first %}eager{% else %}lazy{% endif %}">
                    </a>
                    {% else %}
                    <img src="{{ image.image.url }}"
                         class="carousel-image"
                         alt="Carousel Image {{ forloop.counter }}"
                         loading="{% if forloop.first %}eager{% else %}lazy{% endif %}">
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        </div>

        <!-- Controls -->
        <button class="carousel-control-prev custom-control"
                type="button"
                data-bs-target="#featuredCarousel"
                data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next custom-control"
                type="button"
                data-bs-target="#featuredCarousel"
                data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>

    </div>
</div>

<style>

/* =========================
   SECTION — edge-to-edge
========================= */

.hero-carousel-section {
    width: 100%;
    margin: 0;
    padding: 0;
    line-height: 0; /* kills inline-block gap under img */
    background: #0f172a;
}

/* =========================
   CAROUSEL SHELL
========================= */

#featuredCarousel {
    width: 100%;
    position: relative;
    background: #0f172a;
    overflow: hidden;
    /* Subtle lift — no rounded corners on full-width */
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.18);
}

/* Pure horizontal slide */
#featuredCarousel .carousel-item {
    transition: transform 0.72s cubic-bezier(0.77, 0, 0.18, 1);
}

/* =========================
   IMAGE WRAPPER
   16:5 — matches Google
   Classroom banner ratio
   (≈ 1600 × 500 px)
========================= */

.carousel-image-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 5;   /* ← THE key line */
    overflow: hidden;
    background: #1e293b;
}

/* Skeleton shimmer */
.carousel-image-wrapper::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        90deg,
        #1e293b 25%,
        #334155 50%,
        #1e293b 75%
    );
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite linear;
    z-index: 1;
}

.carousel-image-wrapper.loaded::before {
    display: none;
}

@keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* =========================
   IMAGE — fills wrapper
========================= */

.carousel-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    position: relative;
    z-index: 2;
    line-height: 0;
}

/* Anchor inside wrapper must also fill it */
.carousel-image-wrapper a {
    display: block;
    width: 100%;
    height: 100%;
    line-height: 0;
}

/* =========================
   CONTROLS
========================= */

.custom-control {
    width: 6%;
    min-width: 44px;
    opacity: 0;
    transition: opacity 0.25s ease;
    z-index: 10;
}

#featuredCarousel:hover .custom-control {
    opacity: 1;
}

.carousel-control-prev-icon,
.carousel-control-next-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background-color: rgba(15, 23, 42, 0.70);
    background-size: 38%;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    transition:
        transform 0.2s ease,
        background-color 0.2s ease;
}

.carousel-control-prev-icon:hover,
.carousel-control-next-icon:hover {
    transform: scale(1.1);
    background-color: rgba(30, 41, 59, 0.92);
}

/* =========================
   INDICATORS
========================= */

.custom-indicators {
    bottom: 14px;
    gap: 7px;
    margin-bottom: 0;
}

.custom-indicators button {
    width: 28px;
    height: 3px;
    border: none;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.40);
    transition:
        width 0.25s ease,
        background 0.25s ease;
    padding: 0;
}

.custom-indicators button.active {
    width: 48px;
    background: #ffffff;
}

/* =========================
   RESPONSIVE
   Aspect-ratio does the work.
   We only tweak controls/
   indicators at small sizes.
========================= */

/* Touch devices — always show controls */
@media (hover: none) {
    .custom-control {
        opacity: 1;
        width: 10%;
    }
}

@media (max-width: 768px) {
    .carousel-control-prev-icon,
    .carousel-control-next-icon {
        width: 36px;
        height: 36px;
    }
    .custom-indicators button {
        width: 18px;
        height: 3px;
    }
    .custom-indicators button.active {
        width: 32px;
    }
    .custom-indicators {
        bottom: 10px;
        gap: 5px;
    }
}

@media (max-width: 480px) {
    .carousel-control-prev-icon,
    .carousel-control-next-icon {
        width: 28px;
        height: 28px;
    }
    .custom-indicators button {
        width: 12px;
        height: 2px;
    }
    .custom-indicators button.active {
        width: 22px;
    }
    .custom-indicators {
        bottom: 8px;
        gap: 4px;
    }
}

</style>

<script>
document.addEventListener('DOMContentLoaded', function () {

    // ── Skeleton removal ──────────────────────────────────────
    document.querySelectorAll('.carousel-image').forEach(function (img) {
        var wrapper = img.closest('.carousel-image-wrapper');
        function markLoaded() {
            if (wrapper) wrapper.classList.add('loaded');
        }
        if (img.complete && img.naturalWidth > 0) {
            markLoaded();
        } else {
            img.addEventListener('load',  markLoaded);
            img.addEventListener('error', markLoaded);
        }
    });

    // ── Bootstrap carousel init ───────────────────────────────
    var carouselEl = document.querySelector('#featuredCarousel');
    if (carouselEl && window.bootstrap) {
        carouselEl.classList.remove('carousel-fade');
        var carousel = new bootstrap.Carousel(carouselEl, {
            interval : 5000,
            ride     : 'carousel',
            pause    : 'hover',
            wrap     : true,
            touch    : true
        });
        carousel.cycle();
        carouselEl.addEventListener('slid.bs.carousel', function () {
            carousel.cycle();
        });
    }
});
</script>

{% endif %}
