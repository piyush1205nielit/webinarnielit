{% load static %}
{% if carousel_images %}

<section class="hero-banner-section">

    <div id="featuredCarousel"
         class="carousel slide hero-carousel"
         data-bs-ride="carousel"
         data-bs-interval="5000"
         data-bs-pause="hover">

        <!-- Indicators -->
        <div class="carousel-indicators hero-indicators">

            {% for image in carousel_images %}
            <button type="button"
                    data-bs-target="#featuredCarousel"
                    data-bs-slide-to="{{ forloop.counter0 }}"
                    {% if forloop.first %}class="active"{% endif %}
                    aria-label="Slide {{ forloop.counter }}">
            </button>
            {% endfor %}

        </div>

        <!-- Slides -->
        <div class="carousel-inner">

            {% for image in carousel_images %}

            <div class="carousel-item {% if forloop.first %}active{% endif %}">

                {% if image.link_url %}
                <a href="{{ image.link_url }}"
                   target="_blank"
                   rel="noopener noreferrer"
                   class="hero-slide-link">
                {% endif %}

                <div class="hero-image-wrapper">

                    <img src="{{ image.image.url }}"
                         class="hero-image"
                         alt="Carousel Image {{ forloop.counter }}"
                         loading="{% if forloop.first %}eager{% else %}lazy{% endif %}">

                    <div class="hero-overlay"></div>

                </div>

                {% if image.link_url %}
                </a>
                {% endif %}

            </div>

            {% endfor %}

        </div>

        <!-- Controls -->
        <button class="carousel-control-prev hero-control"
                type="button"
                data-bs-target="#featuredCarousel"
                data-bs-slide="prev">

            <span class="carousel-control-prev-icon"></span>

        </button>

        <button class="carousel-control-next hero-control"
                type="button"
                data-bs-target="#featuredCarousel"
                data-bs-slide="next">

            <span class="carousel-control-next-icon"></span>

        </button>

    </div>

</section>

<style>

/* =====================================================
   HERO SECTION
===================================================== */

.hero-banner-section {
    width: 100%;
    padding: 0;
    margin: 0;
    background: #f8fafc;
}

/* =====================================================
   CAROUSEL
===================================================== */

.hero-carousel {
    width: 100%;
    position: relative;
    overflow: hidden;
    background: #111827;
}

/* =====================================================
   IMAGE WRAPPER
   Google Classroom-like banner ratio
===================================================== */

.hero-image-wrapper {

    position: relative;

    width: 100%;

    /*
      Consistent banner ratio
      Similar to Google Classroom header
    */
    aspect-ratio: 21 / 7;

    overflow: hidden;

    background: #111827;
}

/* =====================================================
   IMAGE
===================================================== */

.hero-image {

    width: 100%;
    height: 100%;

    display: block;

    object-fit: cover;
    object-position: center;

    transform: scale(1);

    transition: transform 7s ease;
}

/* Smooth zoom effect */

.carousel-item.active .hero-image {
    transform: scale(1.05);
}

/* =====================================================
   OVERLAY
===================================================== */

.hero-overlay {

    position: absolute;
    inset: 0;

    background:
        linear-gradient(
            to bottom,
            rgba(15,23,42,0.08),
            rgba(15,23,42,0.30)
        );

    z-index: 1;
}

/* =====================================================
   LINK FIX
===================================================== */

.hero-slide-link {

    display: block;
    text-decoration: none;
}

/* =====================================================
   CONTROLS
===================================================== */

.hero-control {

    width: 8%;

    opacity: 0;

    transition: opacity 0.25s ease;
}

.hero-carousel:hover .hero-control {
    opacity: 1;
}

.carousel-control-prev-icon,
.carousel-control-next-icon {

    width: 48px;
    height: 48px;

    border-radius: 50%;

    background-color: rgba(15,23,42,0.72);

    backdrop-filter: blur(8px);

    background-size: 40%;

    transition:
        transform 0.2s ease,
        background-color 0.2s ease;
}

.carousel-control-prev-icon:hover,
.carousel-control-next-icon:hover {

    transform: scale(1.08);

    background-color: rgba(15,23,42,0.92);
}

/* =====================================================
   INDICATORS
===================================================== */

.hero-indicators {

    bottom: 16px;

    gap: 8px;

    margin-bottom: 0;
}

.hero-indicators button {

    width: 24px;
    height: 4px;

    border: none;

    border-radius: 999px;

    background: rgba(255,255,255,0.45);

    transition:
        width 0.25s ease,
        background 0.25s ease;
}

.hero-indicators button.active {

    width: 52px;

    background: white;
}

/* =====================================================
   RESPONSIVE
===================================================== */

/* Large tablets */

@media (max-width: 992px) {

    .hero-control {

        opacity: 1;

        width: 12%;
    }

    .carousel-control-prev-icon,
    .carousel-control-next-icon {

        width: 40px;
        height: 40px;
    }

}

/* Mobile */

@media (max-width: 768px) {

    .hero-image-wrapper {

        /*
          Slightly taller ratio on mobile
          so image doesn't become too thin
        */
        aspect-ratio: 16 / 6;
    }

    .hero-control {

        width: 14%;
    }

    .carousel-control-prev-icon,
    .carousel-control-next-icon {

        width: 34px;
        height: 34px;
    }

    .hero-indicators {

        bottom: 10px;

        gap: 6px;
    }

    .hero-indicators button {

        width: 16px;
        height: 3px;
    }

    .hero-indicators button.active {

        width: 30px;
    }

}

/* Small mobile */

@media (max-width: 480px) {

    .hero-image-wrapper {

        /*
          Better phone banner ratio
        */
        aspect-ratio: 16 / 7;
    }

    .hero-control {

        width: 16%;
    }

    .carousel-control-prev-icon,
    .carousel-control-next-icon {

        width: 28px;
        height: 28px;
    }

    .hero-indicators button {

        width: 12px;
        height: 3px;
    }

    .hero-indicators button.active {

        width: 22px;
    }

}

</style>

<script>

document.addEventListener('DOMContentLoaded', function () {

    const carouselElement = document.querySelector('#featuredCarousel');

    if (carouselElement && window.bootstrap) {

        const carousel = new bootstrap.Carousel(carouselElement, {
            interval: 5000,
            ride: 'carousel',
            pause: 'hover',
            wrap: true,
            touch: true
        });

        carousel.cycle();
    }

});

</script>

{% endif %}
