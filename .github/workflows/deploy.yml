name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        env:
          DJANGO_SECRET_KEY: test-secret-key-not-for-production
          DEBUG: 'True'
          ALLOWED_HOSTS: 'localhost,127.0.0.1'
          USE_S3: 'False'
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_STORAGE_BUCKET_NAME: dummy-bucket
          AWS_S3_REGION_NAME: ap-south-1
        run: |
          python manage.py test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "=== Navigating to project ==="
            cd /home/ubuntu/webinarnielit

            echo "=== Commit BEFORE pull ==="
            git log --oneline -1

            echo "=== Syncing with GitHub (force) ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Commit AFTER sync ==="
            git log --oneline -1

            echo "=== Updating AWS S3 variables in existing .env ==="
            sed -i '/^USE_S3=/d; /^AWS_ACCESS_KEY_ID=/d; /^AWS_SECRET_ACCESS_KEY=/d; /^AWS_STORAGE_BUCKET_NAME=/d; /^AWS_S3_REGION_NAME=/d' .env
            cat >> .env << 'ENVEOF'
            USE_S3=True
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_STORAGE_BUCKET_NAME=${{ secrets.AWS_STORAGE_BUCKET_NAME }}
            AWS_S3_REGION_NAME=${{ secrets.AWS_S3_REGION_NAME }}
            ENVEOF

            echo "=== Activating venv ==="
            source /home/ubuntu/venv/bin/activate

            echo "=== Installing dependencies ==="
            pip install -r requirements.txt

            echo "=== Running migrations ==="
            python manage.py migrate

            echo "=== Collecting static files ==="
            python manage.py collectstatic --noinput

            echo "=== Restarting services ==="
            sudo systemctl restart webinarnielit
            sudo systemctl restart nginx

            echo "=== Deployment successful ==="